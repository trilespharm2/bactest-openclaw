<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Reset Password - BacktestPro</title>
    <meta content="width=device-width, initial-scale=1.0, shrink-to-fit=no" name="viewport" />
    <link rel="icon" href="/static/img/kaiadmin/favicon.ico" type="image/x-icon" />

    <script src="/static/js/plugin/webfont/webfont.min.js"></script>
    <script>
      WebFont.load({
        google: { families: ["Public Sans:300,400,500,600,700"] },
        custom: {
          families: ["Font Awesome 5 Solid", "Font Awesome 5 Regular", "Font Awesome 5 Brands", "simple-line-icons"],
          urls: ["/static/css/fonts.min.css"],
        },
        active: function () { sessionStorage.fonts = true; },
      });
    </script>

    <link rel="stylesheet" href="/static/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/static/css/plugins.min.css" />
    <link rel="stylesheet" href="/static/css/kaiadmin.min.css" />
    <link rel="stylesheet" href="/static/css/fonts.min.css" />
    
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .auth-container {
        width: 100%;
        max-width: 450px;
      }
      .auth-card {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
      }
      .auth-header {
        background: linear-gradient(135deg, #1b55e2 0%, #764ba2 100%);
        padding: 40px 30px;
        text-align: center;
        color: white;
      }
      .auth-header h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
      }
      .auth-header p {
        opacity: 0.9;
        font-size: 14px;
      }
      .auth-body {
        padding: 40px 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        font-weight: 600;
        color: #344767;
        margin-bottom: 8px;
        display: block;
      }
      .form-control {
        height: 50px;
        border-radius: 10px;
        border: 1px solid #e0e0e0;
        padding: 12px 15px;
        font-size: 15px;
        transition: all 0.3s;
      }
      .form-control:focus {
        border-color: #1b55e2;
        box-shadow: 0 0 0 3px rgba(27, 85, 226, 0.1);
      }
      .btn-submit {
        width: 100%;
        height: 50px;
        background: linear-gradient(135deg, #1b55e2 0%, #764ba2 100%);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }
      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(27, 85, 226, 0.4);
      }
      .auth-footer {
        text-align: center;
        padding: 20px 30px 30px;
        border-top: 1px solid #eee;
      }
      .auth-footer a {
        color: #1b55e2;
        text-decoration: none;
        font-weight: 600;
      }
      .auth-footer a:hover {
        text-decoration: underline;
      }
      .logo-link {
        display: inline-block;
        margin-bottom: 30px;
        color: white;
        text-decoration: none;
        font-size: 24px;
        font-weight: 700;
      }
      .alert {
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 20px;
        font-size: 14px;
      }
      .icon-container {
        width: 80px;
        height: 80px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      .icon-container i {
        font-size: 36px;
      }
      .password-requirements {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
        padding-left: 0;
        list-style: none;
      }
      .password-requirements li {
        margin-bottom: 3px;
      }
      .password-requirements li.valid {
        color: #28a745;
      }
      .password-requirements li.valid::before {
        content: "✓ ";
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="text-center">
        <a href="/" class="logo-link">BacktestPro</a>
      </div>
      <div class="auth-card">
        <div class="auth-header">
          <div class="icon-container">
            <i class="fas fa-key"></i>
          </div>
          <h1>Reset Password</h1>
          <p>Create a new password for your account</p>
        </div>
        <div class="auth-body">
          <div id="alertBox" class="alert" style="display: none;"></div>
          
          <form id="resetForm">
            <div class="form-group">
              <label for="password">New Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter new password" required>
              <ul class="password-requirements">
                <li id="req-length">At least 8 characters</li>
                <li id="req-upper">One uppercase letter</li>
                <li id="req-number">One number</li>
              </ul>
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm New Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
              <span id="submitBtnText">Reset Password</span>
              <span id="submitSpinner" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i> Resetting...
              </span>
            </button>
          </form>
        </div>
        <div class="auth-footer">
          <p>Remember your password? <a href="/login">Sign in</a></p>
        </div>
      </div>
    </div>

    <script src="/static/js/core/jquery-3.7.1.min.js"></script>
    <script src="/static/js/core/popper.min.js"></script>
    <script src="/static/js/core/bootstrap.min.js"></script>
    
    <script>
      const passwordInput = document.getElementById('password');
      const reqLength = document.getElementById('req-length');
      const reqUpper = document.getElementById('req-upper');
      const reqNumber = document.getElementById('req-number');

      passwordInput.addEventListener('input', function() {
        const password = this.value;
        
        if (password.length >= 8) {
          reqLength.classList.add('valid');
        } else {
          reqLength.classList.remove('valid');
        }
        
        if (/[A-Z]/.test(password)) {
          reqUpper.classList.add('valid');
        } else {
          reqUpper.classList.remove('valid');
        }
        
        if (/[0-9]/.test(password)) {
          reqNumber.classList.add('valid');
        } else {
          reqNumber.classList.remove('valid');
        }
      });

      // Get token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');
        const submitBtnText = document.getElementById('submitBtnText');
        const submitSpinner = document.getElementById('submitSpinner');
        
        if (password !== confirmPassword) {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = 'Passwords do not match.';
          alertBox.style.display = 'block';
          return;
        }
        
        if (password.length < 8) {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = 'Password must be at least 8 characters.';
          alertBox.style.display = 'block';
          return;
        }
        
        if (!token) {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = 'Invalid or missing reset token.';
          alertBox.style.display = 'block';
          return;
        }
        
        submitBtnText.style.display = 'none';
        submitSpinner.style.display = 'inline';
        submitBtn.disabled = true;
        
        try {
          const response = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ token, password })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            alertBox.className = 'alert alert-success';
            alertBox.textContent = data.message || 'Password reset successful! Redirecting to login...';
            alertBox.style.display = 'block';
            setTimeout(() => {
              window.location.href = '/login';
            }, 2000);
          } else {
            alertBox.className = 'alert alert-danger';
            alertBox.textContent = data.error || 'Password reset failed. Please try again.';
            alertBox.style.display = 'block';
          }
        } catch (error) {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = 'Connection error. Please try again.';
          alertBox.style.display = 'block';
        } finally {
          submitBtnText.style.display = 'inline';
          submitSpinner.style.display = 'none';
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Sign Up - BacktestPro</title>
    <meta content="width=device-width, initial-scale=1.0, shrink-to-fit=no" name="viewport" />
    <link rel="icon" href="/static/img/kaiadmin/favicon.ico" type="image/x-icon" />

    <script src="/static/js/plugin/webfont/webfont.min.js"></script>
    <script>
      WebFont.load({
        google: { families: ["Public Sans:300,400,500,600,700"] },
        custom: {
          families: ["Font Awesome 5 Solid", "Font Awesome 5 Regular", "Font Awesome 5 Brands", "simple-line-icons"],
          urls: ["/static/css/fonts.min.css"],
        },
        active: function () { sessionStorage.fonts = true; },
      });
    </script>

    <link rel="stylesheet" href="/static/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/static/css/plugins.min.css" />
    <link rel="stylesheet" href="/static/css/kaiadmin.min.css" />
    <link rel="stylesheet" href="/static/css/fonts.min.css" />
    
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .auth-container {
        width: 100%;
        max-width: 500px;
      }
      .auth-card {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
      }
      .auth-header {
        background: linear-gradient(135deg, #1b55e2 0%, #764ba2 100%);
        padding: 40px 30px;
        text-align: center;
        color: white;
      }
      .auth-header h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
      }
      .auth-header p {
        opacity: 0.9;
        font-size: 14px;
      }
      .auth-body {
        padding: 40px 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        font-weight: 600;
        color: #344767;
        margin-bottom: 8px;
        display: block;
      }
      .form-control {
        height: 50px;
        border-radius: 10px;
        border: 1px solid #e0e0e0;
        padding: 12px 15px;
        font-size: 15px;
        transition: all 0.3s;
      }
      .form-control:focus {
        border-color: #1b55e2;
        box-shadow: 0 0 0 3px rgba(27, 85, 226, 0.1);
      }
      .btn-register {
        width: 100%;
        height: 50px;
        background: linear-gradient(135deg, #1b55e2 0%, #764ba2 100%);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }
      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(27, 85, 226, 0.4);
      }
      .btn-google {
        width: 100%;
        height: 50px;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        color: #344767;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.3s;
        text-decoration: none;
      }
      .btn-google:hover {
        background: #f5f5f5;
        border-color: #ccc;
      }
      .divider {
        display: flex;
        align-items: center;
        margin: 25px 0;
        color: #999;
        font-size: 13px;
      }
      .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e0e0e0;
      }
      .divider span {
        padding: 0 15px;
      }
      .auth-footer {
        text-align: center;
        padding: 20px 30px 30px;
        border-top: 1px solid #eee;
      }
      .auth-footer a {
        color: #1b55e2;
        text-decoration: none;
        font-weight: 600;
      }
      .auth-footer a:hover {
        text-decoration: underline;
      }
      .logo-link {
        display: inline-block;
        margin-bottom: 30px;
        color: white;
        text-decoration: none;
        font-size: 24px;
        font-weight: 700;
      }
      .alert {
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 20px;
        font-size: 14px;
      }
      .password-requirements {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
      }
      .password-requirements li {
        margin-bottom: 3px;
      }
      .password-requirements li.valid {
        color: #28a745;
      }
      .password-requirements li.valid::before {
        content: "✓ ";
      }
      .terms-text {
        font-size: 13px;
        color: #666;
        margin-bottom: 20px;
      }
      .terms-text a {
        color: #1b55e2;
        text-decoration: none;
      }
      .terms-text a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="text-center">
        <a href="/" class="logo-link">BacktestPro</a>
      </div>
      <div class="auth-card">
        <div class="auth-header">
          <h1>Create Account</h1>
          <p>Start backtesting your strategies today</p>
        </div>
        <div class="auth-body">
          <div id="alertBox" class="alert" style="display: none;"></div>
          
          <a href="/google-login" class="btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
          </a>
          
          <div class="divider"><span>or register with email</span></div>
          
          <form id="registerForm">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Create a password" required>
              <ul class="password-requirements">
                <li id="req-length">At least 8 characters</li>
                <li id="req-upper">One uppercase letter</li>
                <li id="req-number">One number</li>
              </ul>
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <div class="terms-text">
              By creating an account, you agree to our <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.
            </div>
            <button type="submit" class="btn-register" id="registerBtn">
              <span id="registerBtnText">Create Account</span>
              <span id="registerSpinner" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i> Creating account...
              </span>
            </button>
          </form>
        </div>
        <div class="auth-footer">
          <p>Already have an account? <a href="/login">Sign in</a></p>
        </div>
      </div>
    </div>

    <script src="/static/js/core/jquery-3.7.1.min.js"></script>
    <script src="/static/js/core/popper.min.js"></script>
    <script src="/static/js/core/bootstrap.min.js"></script>
    
    <script>
      const passwordInput = document.getElementById('password');
      const reqLength = document.getElementById('req-length');
      const reqUpper = document.getElementById('req-upper');
      const reqNumber = document.getElementById('req-number');

      passwordInput.addEventListener('input', function() {
        const password = this.value;
        
        if (password.length >= 8) {
          reqLength.classList.add('valid');
        } else {
          reqLength.classList.remove('valid');
        }
        
        if (/[A-Z]/.test(password)) {
          reqUpper.classList.add('valid');
        } else {
          reqUpper.classList.remove('valid');
        }
        
        if (/[0-9]/.test(password)) {
          reqNumber.classList.add('valid');
        } else {
          reqNumber.classList.remove('valid');
        }
      });

      document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const alertBox = document.getElementById('alertBox');
        const registerBtn = document.getElementById('registerBtn');
        const registerBtnText = document.getElementById('registerBtnText');
        const registerSpinner = document.getElementById('registerSpinner');
        
        if (password !== confirmPassword) {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = 'Passwords do not match.';
          alertBox.style.display = 'block';
          return;
        }
        
        if (password.length < 8) {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = 'Password must be at least 8 characters.';
          alertBox.style.display = 'block';
          return;
        }
        
        registerBtnText.style.display = 'none';
        registerSpinner.style.display = 'inline';
        registerBtn.disabled = true;
        
        try {
          const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ name, email, password })
          });
          
          const data = await response.json();
          
          if (response.ok) {
            alertBox.className = 'alert alert-success';
            alertBox.textContent = data.message || 'Registration successful! Please check your email to verify your account.';
            alertBox.style.display = 'block';
            setTimeout(() => {
              window.location.href = '/login?registered=true';
            }, 2000);
          } else {
            alertBox.className = 'alert alert-danger';
            alertBox.textContent = data.error || 'Registration failed. Please try again.';
            alertBox.style.display = 'block';
          }
        } catch (error) {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = 'Connection error. Please try again.';
          alertBox.style.display = 'block';
        } finally {
          registerBtnText.style.display = 'inline';
          registerSpinner.style.display = 'none';
          registerBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>

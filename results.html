<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Backtest History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #4da6ff;
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header p {
            color: #888;
            font-size: 16px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1f26;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #2a3038;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #4da6ff;
            font-size: 28px;
            font-weight: 600;
        }

        .results-grid {
            display: grid;
            gap: 20px;
        }

        .result-card {
            background: #1a1f26;
            border: 2px solid #2a3038;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .result-card:hover {
            border-color: #4da6ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(77, 166, 255, 0.15);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a3038;
        }

        .result-info h3 {
            color: #4da6ff;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .result-id {
            color: #888;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }

        .result-meta {
            text-align: right;
        }

        .result-date {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        
        .status-badge.status-running {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-badge.status-error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        
        .loading-dot {
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .result-card-loading {
            border-color: rgba(59, 130, 246, 0.4);
        }
        
        .result-card-error {
            border-color: rgba(244, 67, 54, 0.4);
        }
        
        .result-loading-content, .result-error-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            color: #888;
        }
        
        .result-loading-content .loading-spinner-small {
            width: 32px;
            height: 32px;
            border: 3px solid #2a3038;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .result-loading-content p {
            margin: 4px 0;
            font-size: 14px;
        }
        
        .result-loading-content .loading-hint {
            font-size: 12px;
            color: #666;
        }
        
        .result-error-content i {
            font-size: 32px;
            color: #f44336;
            margin-bottom: 12px;
        }
        
        .result-error-content p {
            font-size: 14px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-item {
            background: #0f1419;
            padding: 15px;
            border-radius: 6px;
        }

        .stat-item-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
            display: block;
        }

        .stat-item-value {
            color: #e0e0e0;
            font-size: 20px;
            font-weight: 600;
        }

        .stat-item-value.positive {
            color: #4caf50;
        }

        .stat-item-value.negative {
            color: #f44336;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #555;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        .loading i {
            font-size: 48px;
            margin-bottom: 15px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            overflow-y: auto;
        }

        .modal-content {
            background: #1a1f26;
            margin: 50px auto;
            padding: 0;
            border-radius: 12px;
            max-width: 1400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 25px 30px;
            border-bottom: 2px solid #2a3038;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #4da6ff;
            font-size: 24px;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 36px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #4da6ff;
        }

        .modal-body {
            padding: 30px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .detail-section {
            background: #0f1419;
            padding: 20px;
            border-radius: 8px;
        }

        .detail-section h4 {
            color: #4da6ff;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .equity-curve {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .trades-table {
            width: 100%;
            background: #0f1419;
            border-radius: 8px;
            overflow: hidden;
        }

        .trades-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .trades-table th {
            background: #1a1f26;
            color: #888;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
        }

        .trades-table td {
            padding: 12px;
            border-top: 1px solid #2a3038;
            font-size: 14px;
        }

        .trades-table tr:hover {
            background: #1a1f26;
        }

        .download-btn {
            background: #4da6ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }

        .download-btn:hover {
            background: #3a8fdd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-chart-bar"></i>
                Backtest Results
            </h1>
            <p>View and analyze all your backtest runs</p>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Total Backtests</div>
                <div class="stat-value" id="totalBacktests">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Trades</div>
                <div class="stat-value" id="totalTrades">0</div>
            </div>
        </div>

        <div class="results-grid" id="resultsGrid">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>Loading backtest results...</p>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Backtest Details</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading details...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="results-script.js"></script>
</body>
</html>
